name: Local Deployment

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stop Existing Containers
        run: |
          docker compose down

      - name: Build New Containers
        run: |
          docker compose build

      - name: Start Containers
        run: |
          docker compose up -d

      - name: Verify
        run: docker ps